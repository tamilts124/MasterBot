name: WhatsApp Broadcast Agent

on:
  schedule:
    # 5:00 AM IST is 11:30 PM UTC (previous day)
    - cron: '30 23 * * *'
    # 5:00 PM IST is 11:30 AM UTC
    - cron: '30 11 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: 'AI Agent Prompt'
        required: false
      provider:
        description: 'LLM Provider (ollama or anthropic)'
        default: 'ollama'
        required: false
      model:
        description: 'Model to use (overrides vars.BROADCAST_MODEL)'
        required: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout AI CLI Repository
        uses: actions/checkout@v4

      - name: Clone WhatsApp API Repository
        run: |
          git clone https://github.com/tamilts124/WhatsApp_API.git
          cd WhatsApp_API
          # Ensure auth_info directory exists
          mkdir -p auth_info

      - name: Install 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Decrypt and Extract Session Data
        run: |
          7z x auth_info.7z -p"${{ secrets.AUTH_INFO_PASSWORD }}" -o./WhatsApp_API/
          # Move files if they were extracted into a nested folder, or ensure the path is correct
          # Assuming auth_info.7z contains the 'auth_info' folder itself.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run WhatsApp API
        working-directory: ./WhatsApp_API
        run: |
          docker build -t whatsapp-api .
          docker run -d --name wa-service -p 3000:3000 whatsapp-api
          # Wait for the service to initialize
          docker ps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Agent
        env:
          MAX_TOOL_OUTPUT: 60000
          AGENT_PROMPT1: ${{ vars.AGENT_PROMPT1 }}
          AGENT_PROMPT2: ${{ vars.AGENT_PROMPT2 }}
          AGENT_PROMPT3: ${{ vars.AGENT_PROMPT3 }}
          PROVIDER: "${{ github.event.inputs.provider || 'ollama' }}"
          MODEL: "${{ github.event.inputs.model || vars.BROADCAST_MODEL || 'gemma4:31b-cloud' }}"
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_URL: ${{ vars.ANTHROPIC_API_URL }}
        run: |
          python -m ai_agent.sas.main \
            --model "$MODEL" \
            --provider "$PROVIDER" \
            --ollama-url "https://ollama.com" \
            --ollama-key "$OLLAMA_API_KEY" \
            --anthropic-key "$ANTHROPIC_API_KEY" \
            --anthropic-url "$ANTHROPIC_URL" \
            --whatsapp "${{ secrets.WHATSAPP_NUMBER1 }}" \
            --whatsapp-url "http://localhost:3000" \
            --prompt "$AGENT_PROMPT1" \
            --quiet

          python -m ai_agent.sas.main \
            --model "$MODEL" \
            --provider "$PROVIDER" \
            --ollama-url "https://ollama.com" \
            --ollama-key "$OLLAMA_API_KEY" \
            --anthropic-key "$ANTHROPIC_API_KEY" \
            --anthropic-url "$ANTHROPIC_URL" \
            --whatsapp "${{ secrets.WHATSAPP_NUMBER2 }}" \
            --whatsapp-url "http://localhost:3000" \
            --prompt "$AGENT_PROMPT2" \
            --quiet

          python -m ai_agent.sas.main \
            --model "$MODEL" \
            --provider "$PROVIDER" \
            --ollama-url "https://ollama.com" \
            --ollama-key "$OLLAMA_API_KEY" \
            --anthropic-key "$ANTHROPIC_API_KEY" \
            --anthropic-url "$ANTHROPIC_URL" \
            --whatsapp "${{ secrets.WHATSAPP_NUMBER3 }}" \
            --whatsapp-url "http://localhost:3000" \
            --prompt "$AGENT_PROMPT3" \
            --quiet
