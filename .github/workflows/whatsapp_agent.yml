name: WhatsApp AI Agent Automation

on:
  schedule:
    # 5:00 AM IST is 11:30 PM UTC (previous day)
    - cron: '30 23 * * *'
    # 10:00 PM UTC (as specified)
    - cron: '00 22 * * *'
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'AI Agent Prompt'
        required: false
      debug:
        description: 'Enable Pinggy SSH Debugging'
        required: false
        default: false
        type: boolean


jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout AI CLI Repository
        uses: actions/checkout@v4

      - name: Clone WhatsApp API Repository
        run: |
          git clone https://github.com/tamilts124/WhatsApp_API.git
          cd WhatsApp_API
          # Ensure auth_info directory exists
          mkdir -p auth_info

      - name: Install 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Decrypt and Extract Session Data
        run: |
          7z x auth_info.7z -p"${{ secrets.AUTH_INFO_PASSWORD }}" -o./WhatsApp_API/
          # Move files if they were extracted into a nested folder, or ensure the path is correct
          # Assuming auth_info.7z contains the 'auth_info' folder itself.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run WhatsApp API
        working-directory: ./WhatsApp_API
        run: |
          docker build -t whatsapp-api .
          docker run -d --name wa-service -p 3000:3000 whatsapp-api
          # Wait for the service to initialize
          echo "Waiting for WhatsApp API to start..."
          sleep 15
          docker ps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Setup Pinggy SSH (DEBUG)
        if: ${{ inputs.debug == true }}
        run: |
          sudo apt-get update && sudo apt-get install -y openssh-server
          echo "runner:debug123" | sudo chpasswd
          sudo service ssh start
          ssh -p 443 -o StrictHostKeyChecking=no -R0:localhost:22 tcp@a.pinggy.io > pinggy.log 2>&1 &
          sleep 10
          echo "=========================================================="
          echo "PINGGY CONNECTION INFO:"
          cat pinggy.log
          echo "PASSWORD: debug123"
          echo "=========================================================="
          # Keep it open for 1 hour if debug is on
          sleep 3600

      - name: Install Python Dependencies
        if: ${{ inputs.debug == false }}
        run: |
          pip install -r requirements.txt

      - name: Run AI Agent
        if: ${{ inputs.debug == false }}
        env:
          MAX_TOOL_OUTPUT: 60000
          AGENT_PROMPT: ${{ vars.AGENT_PROMPT }}
        run: |
          python -m ai_agent.main \
            --model "gemma4:31b-cloud" \
            --ollama-url "https://ollama.com" \
            --ollama-key "${{ secrets.OLLAMA_API_KEY }}" \
            --whatsapp "${{ secrets.WHATSAPP_NUMBER }}" \
            --whatsapp-url "http://localhost:3000" \
            --prompt "$AGENT_PROMPT" \
            --quiet


