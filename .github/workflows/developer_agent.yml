name: AI Developer Agent

on:
  #schedule:
    # 4:00 AM IST (10:30 PM UTC previous day)
    #- cron: '30 22 * * *'
    # 4:00 PM IST (10:30 AM UTC)
    #- cron: '30 10 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Optional manual task (appended to vars.DEVELOPER_PROMPT)'
        required: false

jobs:
  run-developer-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout AI CLI Repository
        uses: actions/checkout@v4

      - name: Clone WhatsApp API Repository
        run: |
          git clone https://github.com/tamilts124/WhatsApp_API.git
          cd WhatsApp_API
          # Ensure auth_info directory exists
          mkdir -p auth_info

      - name: Install 7-Zip and Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full tor netcat-openbsd
          # Configure Tor Control Port
          sudo bash -c 'cat >> /etc/tor/torrc <<EOF
          ControlPort 9051
          CookieAuthentication 0
          EOF'
          sudo service tor restart
          # Wait for Tor to initialize
          # Verify Tor is running and reachable
          echo "Current IP via Tor:"
          curl --socks5-hostname 127.0.0.1:9050 https://api.ipify.org || echo "Tor not ready yet"

      - name: Decrypt and Extract Session Data
        run: |
          7z x auth_info.7z -p"${{ secrets.AUTH_INFO_PASSWORD }}" -o./WhatsApp_API/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run WhatsApp API
        working-directory: ./WhatsApp_API
        run: |
          docker build -t whatsapp-api .
          docker run -d --name wa-service -p 3000:3000 whatsapp-api
          # Wait for the service to initialize
          echo "Waiting for WhatsApp API to start..."
          docker ps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Developer Agent
        env:
          OLLAMA_API_KEYS: ${{ secrets.OLLAMA_API_KEYS }}
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          # Logic to handle both manual and automated (cron) runs
          PROMPT: "${{ github.event.inputs.prompt }} ${{ vars.DEVELOPER_PROMPT }}"
          TARGET_REPO: ${{ vars.TARGET_REPO_URL }}
          MODEL: ${{ vars.DEVELOPER_MODEL }}
          # Real-time logging
          PYTHONUNBUFFERED: "1"
          # Tor Proxy configuration
          HTTP_PROXY: "socks5h://127.0.0.1:9050"
          HTTPS_PROXY: "socks5h://127.0.0.1:9050"
          ALL_PROXY: "socks5h://127.0.0.1:9050"
        run: |
          python run_developer_agent.py \
            --prompt "$PROMPT" \
            --keys "$OLLAMA_API_KEYS" \
            --target-repo "$TARGET_REPO" \
            --target-token "$TARGET_REPO_TOKEN" \
            --model "$MODEL" \
            --whatsapp "${{ secrets.WHATSAPP_NUMBER1 }}" \
            --whatsapp-url "http://localhost:3000" \
            --max-tool-output 60000
